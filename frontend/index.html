<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CineView — Descubra, avalie e organize seus filmes favoritos." />
  <title>CineView</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages.css" />
  <link rel="stylesheet" href="/css/responsive.css" />

  <!-- Old stylesheet kept for reference — unused in new SPA -->
</head>
<body>
  <div id="app">
    <!-- Header injected by header component -->
    <header id="site-header" role="banner"></header>

    <!-- Page content injected by router -->
    <main id="page-root" role="main" aria-live="polite"></main>

    <!-- Footer injected by footer component -->
    <footer id="site-footer" role="contentinfo"></footer>
  </div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="assertive" aria-atomic="true"></div>

  <!-- Mobile menu -->
  <nav id="mobile-menu" class="mobile-menu" role="navigation" aria-label="Menu móvel"></nav>

  <!-- Modal container -->
  <div id="modal-root"></div>

  <!-- App entry -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
