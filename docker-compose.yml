services:
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: cinereview-nginx
    depends_on:
      fastapi:
        condition: service_healthy
    ports:
      - "80:8080"
      - "443:8443"
    networks:
      - netatividade01

  fastapi:
    build:
      context: ./backend
    container_name: cinereview-fastapi
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netatividade01

  postgres:
    image: postgres:16-alpine
    container_name: cinereview-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netatividade01

volumes:
  postgres_data:

networks:
  netatividade01:
    name: netatividade01
    driver: bridge
